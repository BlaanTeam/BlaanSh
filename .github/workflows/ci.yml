name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install readline (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libreadline-dev

      - name: Install readline (macOS)
        if: runner.os == 'macOS'
        run: brew install readline

      - name: Build
        run: make

      - name: Run tests
        run: make test

      - name: Fuzz parser
        run: make fuzz FUZZ_ITER=150 FUZZ_LINES=40 FUZZ_LINELEN=100
