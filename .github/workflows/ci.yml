name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install readline (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libreadline-dev

      - name: Install readline (macOS)
        if: runner.os == 'macOS'
        run: brew install readline

      - name: Build
        run: make

      - name: Run tests
        run: make test

      - name: Fuzz parser
        timeout-minutes: 3
        env:
          VERBOSE: "1"
        run: |
          echo "uname: $(uname -a)"
          echo "bash:  $(bash --version | head -1)"
          echo "timeout: $(command -v timeout) $(timeout --version 2>&1 | head -1)"
          # Run fewer iters with verbose tracing so we can see where it hangs.
          make fuzz FUZZ_ITER=20 FUZZ_LINES=10 FUZZ_LINELEN=40
