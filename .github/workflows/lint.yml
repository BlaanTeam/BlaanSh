name: Lint

on:
  push:
  pull_request:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpp-linter:
    name: clang-tidy
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth 2 so cpp-linter can diff against the previous commit
          # when files-changed-only is used
          fetch-depth: 2

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libreadline-dev bear clang-tidy

      - name: Generate compile_commands.json
        # bear wraps `make` and records each compiler invocation into
        # compile_commands.json — clang-tidy then knows exact -I flags
        # per translation unit.
        run: |
          make fclean
          bear -- make

      - name: Run clang-tidy
        uses: cpp-linter/cpp-linter-action@v2
        id: linter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Skip clang-format — this codebase uses 42-school style
          # (tabs, BSD-ish braces) which doesn't match any built-in
          # clang-format preset.
          style: ''
          # High-signal C-focused checks. Disabled:
          #  cert-err33-c: noisy on POSIX calls (write/close/dup2/kill);
          #    we deliberately don't check those returns at most sites.
          #  cert-msc24-c / cert-msc33-c: suggest C11 Annex K `*_s` funcs
          #    that aren't portable to glibc/macOS.
          #  cert-sig30-c / bugprone-signal-handler: this codebase's
          #    SIGINT handler calls readline redraw functions
          #    (rl_on_new_line, etc.) as documented by readline itself.
          #  insecureAPI.DeprecatedOrUnsafeBufferHandling: same Annex K
          #    *_s vs memcpy/memset/snprintf/fprintf noise.
          #  optin.core.EnumCastOutOfRange: false positive on the
          #    `(c==X) * TOKEN + …` token-selection arithmetic in the
          #    tokenizer; the zero is intentional.
          #  bugprone-inc-dec-in-conditions: stylistic; existing code
          #    uses `while (s[++i])` heavily.
          #  bugprone-easily-swappable-parameters / narrowing-conversions
          #    / multi-level-implicit-pointer-conversion /
          #    assignment-in-if-condition / not-null-terminated-result:
          #    stylistic, not bug-finding.
          tidy-checks: >-
            bugprone-*,
            cert-*,
            clang-analyzer-*,
            -clang-analyzer-cplusplus*,
            -clang-analyzer-security.insecureAPI.DeprecatedOrUnsafeBufferHandling,
            -clang-analyzer-optin.core.EnumCastOutOfRange,
            -cert-err33-c,
            -cert-msc24-c,
            -cert-msc33-c,
            -cert-sig30-c,
            -cert-msc54-cpp,
            -bugprone-signal-handler,
            -bugprone-inc-dec-in-conditions,
            -bugprone-not-null-terminated-result,
            -bugprone-easily-swappable-parameters,
            -bugprone-narrowing-conversions,
            -bugprone-multi-level-implicit-pointer-conversion,
            -bugprone-assignment-in-if-condition
          # Only lint files touched in this push/PR. New code is held
          # to the linter; legacy code is grandfathered until someone
          # edits it.
          files-changed-only: true
          database: '.'
          version: 18
          step-summary: true
          thread-comments: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}

      - name: Fail when changed files have lint errors
        if: steps.linter.outputs.checks-failed > 0
        run: |
          echo "::error::clang-tidy reported issues on changed files (see annotations and step summary)"
          exit 1
